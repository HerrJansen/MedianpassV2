<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitaler Medienpass | Gymnasium Thomaeum</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Thomaeum Colors */
        .bg-thoma-red { background-color: #BF0D3E; }
        .text-thoma-red { color: #BF0D3E; }
        .border-thoma-red { border-color: #BF0D3E; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- KONFIGURATION (Bitte DEINE echten IDs hier eintragen, falls sie abweichen) ---
        const MS_CONFIG = {
            clientId: "7d277b19-93c1-4df7-8f1b-d38749b3d440", 
            tenantId: "09c4bd58-1b8c-410d-930e-816015e61028",
            siteId: "thomaeumde.sharepoint.com,9ef17c4d-b57b-482e-9168-3cc3bc43bc3d,d600d53b-cfd0-45f7-96a5-f1ac20222f8f",
            listId: "08da02d9-5b67-4938-9d7e-9e9dee97fa2e"
        };

        const msalConfig = {
            auth: { clientId: MS_CONFIG.clientId, authority: `https://login.microsoftonline.com/${MS_CONFIG.tenantId}` },
            cache: { cacheLocation: "sessionStorage", storeAuthStateInCookie: false }
        };
        const msalInstance = new msal.PublicClientApplication(msalConfig);

        // --- MODULE MIT WISSEN ---
        const ALL_MODULES = [
            { 
                id: 1, category: "Skills", title: "Dateimanagement", icon: "folder", 
                wissen: ["Dateien immer logisch benennen (z.B. '2026-03-Bio-Referat.docx').", "Ordnerstrukturen nach Fächern anlegen.", "Regelmäßig den Papierkorb leeren."]
            },
            { 
                id: 2, category: "Skills", title: "Textverarbeitung I", icon: "file-text", 
                wissen: ["Nutze STRG+C (Kopieren) und STRG+V (Einfügen).", "Überschriften immer als 'Formatvorlage' markieren, nicht nur fett machen.", "Eine gut lesbare Schriftart (wie Arial oder Calibri) in Größe 11/12 nutzen."]
            },
            { 
                id: 3, category: "Reflexion", title: "Passwörter & Sicherheit", icon: "shield", 
                wissen: ["Ein sicheres Passwort hat mindestens 12 Zeichen.", "Nutze niemals echte Namen von Haustieren oder dein Geburtsdatum.", "Verwende für verschiedene Seiten unterschiedliche Passwörter."]
            },
            { 
                id: 4, category: "Reflexion", title: "Netiquette", icon: "message-square", 
                wissen: ["Im Chat gilt: Schreibe nichts, was du der Person nicht auch ins Gesicht sagen würdest.", "Ironie versteht man im Text oft falsch – nutze Emojis, um Missverständnisse zu vermeiden.", "Großbuchstaben (SCHREIEN) vermeiden."]
            },
            { 
                id: 5, category: "Skills", title: "Suchmaschinen", icon: "search", 
                wissen: ["Nutze Anführungszeichen für genaue Sätze (z.B. \"Klimawandel Folgen\").", "Glaube nicht gleich dem ersten Suchergebnis.", "Wikipedia ist ein guter Start, aber nicht die einzige Quelle."]
            },
            { 
                id: 6, category: "Reflexion", title: "Urheberrecht", icon: "copyright", 
                wissen: ["Du darfst nicht einfach Bilder aus der Google-Bildersuche für deine Präsentation nehmen.", "Nutze freie Bilddatenbanken wie Pixabay oder Unsplash.", "Gib bei Texten immer die Quelle (den Link) an."]
            }
            // Hier können später weitere 12 Module ergänzt werden...
        ];

        // --- HILFS-KOMPONENTE FÜR ICONS ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = React.useRef(null);
            React.useEffect(() => {
                if (iconRef.current && window.lucide) {
                    window.lucide.createIcons({ icons: { [name]: window.lucide.icons[name] }, nameAttr: 'data-lucide', attrs: { class: className, width: size, height: size } });
                }
            }, [name, size, className]);
            return <i ref={iconRef} data-lucide={name}></i>;
        };

        // --- HAUPT-APP ---
        const App = () => {
            const [user, setUser] = React.useState(null);
            const [isAuthenticating, setIsAuthenticating] = React.useState(false);
            const [studentData, setStudentData] = React.useState({ completedTasks: [] });
            const [activeModal, setActiveModal] = React.useState(null);
            const [errorMsg, setErrorMsg] = React.useState("");

            // LOGIN
            const handleLogin = async () => {
                setIsAuthenticating(true);
                setErrorMsg("");
                try {
                    const loginResponse = await msalInstance.loginPopup({ scopes: ["user.read", "Sites.Read.All"] });
                    setUser({ name: loginResponse.account.name, email: loginResponse.account.username });
                    await fetchStudentData(loginResponse.account.username);
                } catch (err) {
                    console.error("Login Error:", err);
                    setErrorMsg("Fehler bei der Anmeldung. Bitte schließe das Popup nicht zu früh.");
                    setIsAuthenticating(false);
                }
            };

            // LOGOUT
            const handleLogout = () => {
                msalInstance.logoutPopup();
                setUser(null);
            };

            // DATEN AUS SHAREPOINT ABRUFEN
            const fetchStudentData = async (email) => {
                try {
                    const tokenRes = await msalInstance.acquireTokenSilent({ scopes: ["Sites.Read.All"], account: msalInstance.getActiveAccount() });
                    const url = `https://graph.microsoft.com/v1.0/sites/${MS_CONFIG.siteId}/lists/${MS_CONFIG.listId}/items?$filter=fields/Title eq '${email}'&$expand=fields`;
                    
                    const response = await fetch(url, { headers: { "Authorization": `Bearer ${tokenRes.accessToken}`, "Accept": "application/json" } });
                    const data = await response.json();

                    if (data.value && data.value.length > 0) {
                        const fields = data.value[0].fields;
                        const tasks = fields.Erledigte_Module ? fields.Erledigte_Module.split(',').map(s => parseInt(s.trim())) : [];
                        setStudentData({
                            id: data.value[0].id,
                            vorname: fields.Vorname || "Schüler",
                            klasse: fields.Klasse || "-",
                            completedTasks: tasks
                        });
                    } else {
                        // Dummy-Daten, falls der Schüler noch nicht in der Datenbank ist (für Demo-Zwecke)
                        setStudentData({ vorname: "Gast", klasse: "-", completedTasks: [] });
                        setErrorMsg("Achtung: Deine E-Mail-Adresse wurde noch nicht im System hinterlegt. Dies ist ein Gast-Modus.");
                    }
                } catch (err) {
                    console.error("Fetch Error:", err);
                    setErrorMsg("Konnte keine Daten abrufen. Bist du mit dem Internet verbunden?");
                } finally {
                    setIsAuthenticating(false);
                }
            };

            // WENN NICHT EINGELOGGT
            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white max-w-md w-full rounded-3xl shadow-xl overflow-hidden border border-slate-100 p-8 text-center">
                            <div className="w-24 h-24 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6">
                                <Icon name="graduation-cap" size={48} className="text-thoma-red" />
                            </div>
                            <h1 className="text-3xl font-black text-slate-800 mb-2 tracking-tight">Medienpass</h1>
                            <p className="text-slate-500 mb-8 font-medium">Gymnasium Thomaeum</p>
                            {errorMsg && <p className="text-red-600 text-sm mb-6 bg-red-50 p-3 rounded-xl border border-red-100">{errorMsg}</p>}
                            <button 
                                onClick={handleLogin} 
                                disabled={isAuthenticating}
                                className="w-full bg-thoma-red hover:bg-red-800 text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-xl transition-all flex items-center justify-center gap-3"
                            >
                                {isAuthenticating ? <div className="spinner"></div> : <><Icon name="log-in" size={20} /> Mit Microsoft verbinden</>}
                            </button>
                        </div>
                    </div>
                );
            }

            // FORTSCHRITT BERECHNEN
            const progress = Math.round((studentData.completedTasks.length / ALL_MODULES.length) * 100) || 0;
            const skillsModules = ALL_MODULES.filter(m => m.category === "Skills");
            const reflexionModules = ALL_MODULES.filter(m => m.category === "Reflexion");

            return (
                <div className="min-h-screen pb-12">
                    {/* MODAL (WISSENSSPEICHER) */}
                    {activeModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in fade-in duration-200">
                            <div className="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                                
                                {/* Header des Modals */}
                                <div className={`p-6 sm:p-8 flex justify-between items-start text-white ${activeModal.category === 'Reflexion' ? 'bg-indigo-600' : 'bg-emerald-600'}`}>
                                    <div className="flex items-center gap-4">
                                        <div className="bg-white/20 p-3 rounded-2xl">
                                            <Icon name={activeModal.icon} size={32} />
                                        </div>
                                        <div>
                                            <p className="text-white/80 font-bold text-xs uppercase tracking-widest mb-1">{activeModal.category}</p>
                                            <h2 className="text-2xl sm:text-3xl font-black">{activeModal.title}</h2>
                                        </div>
                                    </div>
                                    <button onClick={() => setActiveModal(null)} className="bg-white/20 hover:bg-white/40 rounded-full p-2 transition-colors">
                                        <Icon name="x" size={24} />
                                    </button>
                                </div>

                                {/* Inhalt (Scrollbar) */}
                                <div className="p-6 sm:p-8 overflow-y-auto">
                                    
                                    {/* Sektion 1: Wissen */}
                                    <div className="mb-8">
                                        <h3 className="text-lg font-black text-slate-800 uppercase tracking-tight mb-4 flex items-center gap-2">
                                            <Icon name="book-open" size={20} className="text-slate-400" /> 
                                            Wissensspeicher
                                        </h3>
                                        <ul className="space-y-3">
                                            {activeModal.wissen.map((w, i) => (
                                                <li key={i} className="flex gap-3 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                                    <Icon name="check-circle-2" size={20} className={activeModal.category === 'Reflexion' ? 'text-indigo-500 shrink-0' : 'text-emerald-500 shrink-0'} />
                                                    <span className="text-slate-700 font-medium">{w}</span>
                                                </li>
                                            ))}
                                        </ul>
                                    </div>

                                </div>
                            </div>
                        </div>
                    )}

                    {/* HEADER */}
                    <header className="bg-thoma-red text-white pt-10 pb-16 px-6 sm:px-8 shadow-md rounded-b-[3rem] relative z-10">
                        <div className="max-w-5xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <div className="p-3 bg-white/20 rounded-2xl backdrop-blur-sm">
                                    <Icon name="graduation-cap" size={32} />
                                </div>
                                <div>
                                    <h1 className="text-2xl sm:text-4xl font-black tracking-tighter mb-1">Medienpass</h1>
                                    <p className="text-red-200 font-bold text-sm">Gymnasium Thomaeum</p>
                                </div>
                            </div>
                            <button onClick={handleLogout} className="bg-white/20 hover:bg-white/30 p-3 rounded-xl transition-all" title="Abmelden">
                                <Icon name="log-out" size={20} />
                            </button>
                        </div>
                    </header>

                    {/* FORTSCHRITTSKARTE */}
                    <div className="max-w-5xl mx-auto px-4 sm:px-8 -mt-8 relative z-20 mb-8">
                        <div className="bg-white rounded-[2rem] shadow-xl p-6 sm:p-8 flex flex-col sm:flex-row items-center justify-between gap-6 border border-slate-100">
                            <div>
                                <h2 className="text-2xl font-black text-slate-800">Hallo {studentData.vorname}!</h2>
                                <p className="text-slate-500 font-medium">Klasse {studentData.klasse} • {studentData.completedTasks.length} von {ALL_MODULES.length} Zertifikaten</p>
                                {errorMsg && <p className="text-xs text-red-500 font-bold mt-2">{errorMsg}</p>}
                            </div>
                            <div className="w-full sm:w-1/3">
                                <div className="flex justify-between text-sm font-black text-slate-700 mb-2">
                                    <span>Fortschritt</span>
                                    <span>{progress}%</span>
                                </div>
                                <div className="h-4 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                                    <div className="h-full bg-gradient-to-r from-green-400 to-green-500 rounded-full transition-all duration-1000" style={{ width: `${progress}%` }}></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* MAIN CONTENT (Die zwei Säulen) */}
                    <main className="max-w-5xl mx-auto px-4 sm:px-8 grid grid-cols-1 md:grid-cols-2 gap-8">
                        
                        {/* Säule 1: Skills */}
                        <section>
                            <div className="flex items-center gap-3 mb-6 px-2">
                                <div className="p-2 bg-emerald-100 text-emerald-600 rounded-xl"><Icon name="wrench" size={20} /></div>
                                <h2 className="text-xl font-black text-slate-800 uppercase tracking-tight">Anwendung (Skills)</h2>
                            </div>
                            <div className="grid gap-4">
                                {skillsModules.map(modul => {
                                    const isDone = studentData.completedTasks.includes(modul.id);
                                    return (
                                        <div 
                                            key={modul.id} 
                                            onClick={() => isDone && setActiveModal(modul)}
                                            className={`bg-white rounded-[2rem] p-5 border-2 transition-all flex items-center gap-4 ${isDone ? 'border-emerald-400 shadow-md hover:shadow-lg cursor-pointer hover:-translate-y-1' : 'border-slate-100 opacity-60 grayscale'}`}
                                        >
                                            <div className={`w-14 h-14 rounded-2xl flex items-center justify-center shrink-0 shadow-inner ${isDone ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-100 text-slate-400'}`}>
                                                <Icon name={modul.icon} size={28} />
                                            </div>
                                            <div className="flex-grow">
                                                <h3 className="font-bold text-slate-800">{modul.title}</h3>
                                                <p className="text-xs font-semibold text-slate-500 mt-1">{isDone ? 'Freigeschaltet • Klick für Infos' : 'Noch gesperrt'}</p>
                                            </div>
                                            <div>
                                                {isDone ? <Icon name="check-circle-2" size={28} className="text-emerald-500" /> : <Icon name="lock" size={24} className="text-slate-300" />}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </section>

                        {/* Säule 2: Reflexion */}
                        <section>
                            <div className="flex items-center gap-3 mb-6 px-2">
                                <div className="p-2 bg-indigo-100 text-indigo-600 rounded-xl"><Icon name="brain-circuit" size={20} /></div>
                                <h2 className="text-xl font-black text-slate-800 uppercase tracking-tight">Umgang (Reflexion)</h2>
                            </div>
                            <div className="grid gap-4">
                                {reflexionModules.map(modul => {
                                    const isDone = studentData.completedTasks.includes(modul.id);
                                    return (
                                        <div 
                                            key={modul.id} 
                                            onClick={() => isDone && setActiveModal(modul)}
                                            className={`bg-white rounded-[2rem] p-5 border-2 transition-all flex items-center gap-4 ${isDone ? 'border-indigo-400 shadow-md hover:shadow-lg cursor-pointer hover:-translate-y-1' : 'border-slate-100 opacity-60 grayscale'}`}
                                        >
                                            <div className={`w-14 h-14 rounded-2xl flex items-center justify-center shrink-0 shadow-inner ${isDone ? 'bg-indigo-50 text-indigo-600' : 'bg-slate-100 text-slate-400'}`}>
                                                <Icon name={modul.icon} size={28} />
                                            </div>
                                            <div className="flex-grow">
                                                <h3 className="font-bold text-slate-800">{modul.title}</h3>
                                                <p className="text-xs font-semibold text-slate-500 mt-1">{isDone ? 'Freigeschaltet • Klick für Infos' : 'Noch gesperrt'}</p>
                                            </div>
                                            <div>
                                                {isDone ? <Icon name="check-circle-2" size={28} className="text-indigo-500" /> : <Icon name="lock" size={24} className="text-slate-300" />}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </section>

                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
