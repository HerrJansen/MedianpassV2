                { title: "Warum Passwörter wichtig sind", intro: "Dein Passwort ist der digitale Haustürschlüssel zu deinem Leben. Wenn er zu simpel ist, können Fremde einfach eintreten.", blocks: [
                    { type: 'warning', title: 'Was Hacker lieben', text: 'Ein schlechtes Passwort (wie `123456`, `hallo` oder der Name deines Hundes) lässt sich von speziellen Computerprogrammen in weniger als einer Sekunde knacken. Diese Programme probieren einfach Millionen Wörter pro Sekunde aus.', image: '' },
                    { type: 'info', title: 'Streng geheim!', text: 'Verrate dein Passwort niemals deinen Freunden! Auch nicht deiner besten Freundin. Wenn ihr euch mal streitet, kann das böse enden. Nur du und im Notfall deine Eltern sollten es kennen.' }
                ]},
                { title: "Das perfekte Passwort", intro: "Ein gutes Passwort ist lang, aber trotzdem leicht zu merken.", blocks: [
                    { type: 'standard', title: 'Länge schlägt Komplexität', text: 'Ein Passwort sollte mindestens **12 Zeichen** lang sein. Je länger es ist, desto exponentiell länger braucht ein Computer, um es zu erraten.' },
                    { type: 'tip', title: 'Der Merksatz-Trick', text: 'Denke dir einen völlig verrückten Quatsch-Satz aus, den du dir gut merken kannst. Zum Beispiel: *Ich esse jeden Morgen 3 grüne Äpfel!* Nimm nun nur die Anfangsbuchstaben und die Satzzeichen: `IejM3gÄ!` – und schon hast du ein Passwort, das extrem sicher ist.', image: '' }
                ]}
            ],
            missions: ["Erfinde einen richtig verrückten, witzigen Merksatz für ein neues Passwort.", "Wandle diesen Merksatz in ein sicheres Passwort um (Anfangsbuchstaben, Zahlen und Sonderzeichen).", "Prüfe gedanklich dein aktuelles Passwort für die Schule: Ist es wirklich länger als 8 Zeichen?", "Überlege dir, warum 'Passwort123' das unsicherste Passwort der Welt ist.", "Finde durch eine Internetsuche heraus, was ein 'Passwort-Manager' ist und wie er helfen kann."]
        },

        // ================== KLASSE 7-8 ==================
        8: {
            sections: [
                { title: "1. Technische Bedienung", intro: "Ein gutes Video entsteht nicht beim Filmen, sondern beim Schnitt am Computer oder Tablet.", blocks: [
                    { type: 'standard', title: 'Die Zeitleiste (Timeline)', text: 'Schnitt-Programme wie iMovie oder CapCut arbeiten mit einer Zeitleiste. Du importierst deine aufgenommenen Clips und legst sie nacheinander ab. Mit dem **Split-Werkzeug (Schere)** zerschneidest du Clips, um langweilige Pausen oder Versprecher herauszulöschen.', image: '' },
                    { type: 'info', title: 'Audio-Spuren und Ducking', text: 'Gute Videos haben oft leise Hintergrundmusik. Lege die Musik auf eine zweite Audio-Spur unter dein Video. Nutze die Funktion "Ducking" (oder drehe die Lautstärke manuell herunter), damit die Musik leiser wird, sobald jemand im Video spricht.' },
                    { type: 'warning', title: 'Exportieren (Rendern)', text: 'Wenn du fertig bist, musst du das Video "exportieren" (rendern). Speichere es als **.MP4** Datei ab. Die Projektdatei deines Schnittprogramms kann dein Lehrer nämlich nicht öffnen!' }
                ]},
                { title: "2. Kriterien für Qualität", intro: "Was unterscheidet ein langweiliges Urlaubsvideo von einem spannenden Clip?", blocks: [
                    { type: 'tip', title: 'Der Rote Faden (Storytelling)', text: 'Jedes Video braucht einen **Hook** (einen extrem spannenden Anfang in den ersten 3 Sekunden, der den Zuschauer fesselt), einen informativen Hauptteil und ein klares Ende.' },
                    { type: 'success', title: 'Kurz & Knackig', text: 'Sei gnadenlos beim Schneiden! Entferne rücksichtslos alles, was die Geschichte nicht voranbringt. Besser ein extrem spannendes 2-Minuten-Video als ein langweiliges 10-Minuten-Video.' }
                ]}
            ],
            missions: ["Nimm ein kurzes, 10-sekündiges Video von deiner direkten Umgebung auf.", "Öffne ein Videoschnitt-Programm (oder eine App) und lade den Clip in die Zeitleiste.", "Schneide den Clip genau in der Mitte durch (Split) und lösche die zweite Hälfte.", "Lege einen kurzen Text-Titel (z.B. 'Mein erstes Video') über den Anfang des Clips.", "Exportiere das fertige Projekt auf deinem Gerät als echte, abspielbare .MP4 Datei."]
        },
        9: {
            sections: [
                { title: "1. Technische Bedienung", intro: "Excel und Calc wirken auf den ersten Blick wie riesige, unübersichtliche Gitter. Aber sie nehmen dir all die harte Rechenarbeit ab.", blocks: [
                    { type: 'info', title: 'Das Koordinatensystem', text: 'Jedes Kästchen (Zelle) hat eine eindeutige Adresse, bestehend aus der Spalte (Buchstabe) und der Zeile (Zahl), z.B. **B4**.' },
                    { type: 'warning', title: 'Formeln richtig starten', text: 'Wenn Excel für dich rechnen soll, MUSS in der Zelle immer zuerst ein **Gleichheitszeichen (=)** stehen. Ohne das `=` denkt Excel, du schreibst einfach nur normalen Text.' },
                    { type: 'standard', title: 'Die Summen-Funktion', text: 'Um viele Zahlen blitzschnell zusammenzurechnen, tippe `=SUMME(A1:A5)`. Das rechnet alle Werte von Zelle A1 bis A5 zusammen. Ändert sich später eine Zahl, passt sich die Summe magisch automatisch an!' }
                ]},
                { title: "2. Kriterien für Qualität", intro: "Rohe Zahlenkolonnen sind für den Betrachter extrem langweilig. Du musst sie visualisieren.", blocks: [
                    { type: 'tip', title: 'Übersichtlichkeit schaffen', text: 'Mache Spalten-Überschriften immer fett und gib ihnen eine leichte Hintergrundfarbe. Nutze die Rahmen-Funktion, um echte Tabellenlinien zu ziehen, sonst sieht es beim Ausdrucken furchtbar aus.' },
                    { type: 'success', title: 'Diagramme sprechen lassen', text: 'Markiere deine Daten und erstelle ein Kreisdiagramm (für Prozentanteile) oder ein Säulendiagramm (für Vergleiche). WICHTIG: Ein Diagramm ohne aussagekräftigen Titel und beschriftete Achsen ist absolut wertlos!', image: '' }
                ]}
            ],
            missions: ["Öffne Excel/Calc und trage in Spalte A untereinander deine 3 Lieblingsessen ein.", "Trage in Spalte B fiktive Preise für diese Essen ein.", "Berechne in einer neuen Zelle die Summe der Preise mit der Formel `=SUMME()`.", "Markiere die Essen und die Preise und erstelle ein Säulendiagramm.", "Gib deinem Diagramm einen passenden Titel (z.B. 'Meine Essenskosten')."]
        },
        20: {
            sections: [
                { title: "1. Technische Bedienung", intro: "Gute Fotos macht man nicht nur mit der Kamera, sondern auch nachträglich in der Bildbearbeitung.", blocks: [
                    { type: 'standard', title: 'Zuschneiden (Crop)', text: 'Das wichtigste Werkzeug! Schneide störende, unwichtige Ränder weg, um den vollen Fokus des Betrachters auf dein Hauptmotiv zu lenken.', image: '' },
                    { type: 'info', title: 'Helligkeit & Kontrast', text: 'Ein flaues Bild rettest du durch mehr Kontrast. Aber Vorsicht: Wenn du es zu hell machst, "brennen" helle Flächen aus (sie werden komplett weiß und verlieren alle Details).' },
                    { type: 'tip', title: 'Farbstich korrigieren', text: 'Nutze den Regler "Weißabgleich" (oder Temperatur). Wenn ein Foto drinnen durch Kunstlicht zu gelb (warm) wirkt, ziehe den Regler leicht ins Blaue (kalt), um es natürlich aussehen zu lassen.' }
                ]},
                { title: "2. Kriterien für Qualität", intro: "Bildbearbeitung ist eine Gratwanderung zwischen Optimierung und Manipulation.", blocks: [
                    { type: 'warning', title: 'Weniger ist mehr', text: 'Ein fertiger Instagram-Filter auf 100% sieht oft künstlich und billig aus. Reduziere die Deckkraft des Filters auf 30-50%, um einen professionellen Look zu erzielen.', image: '' },
                    { type: 'success', title: 'Ethik der Manipulation', text: 'Verändere niemals Körperproportionen (Gesichtsform, Taille) von Menschen. Diese Retusche erzeugt bei den Betrachtern extrem falsche und gefährliche Schönheitsideale.' }
                ]}
            ],
            missions: ["Mache ein Foto von einem Gegenstand, der gerade vor dir liegt.", "Öffne das Foto in der Fotos-App und schneide unwichtige Ränder großzügig weg.", "Erhöhe den Kontrast des Bildes ganz leicht, damit die Farben knackiger wirken.", "Lege testweise einen starken Schwarz-Weiß-Filter auf das Bild.", "Vergleiche das Original mit der bearbeiteten Version: Was wirkt besser?"]
        },
        21: {
            sections: [
                { title: "1. Technische Bedienung", intro: "Einen eigenen Podcast oder Voiceover zu erstellen, erfordert ein gutes Gehör und die richtige Technik.", blocks: [
                    { type: 'warning', title: 'Richtig Auspegeln', text: 'Sprich vor der echten Aufnahme probeweise in dein Mikrofon. Der Lautstärke-Ausschlag im Programm sollte im grünen/gelben Bereich sein. Berührt er die rote Linie (0 dB), "übersteuert" es und die Aufnahme kratzt furchtbar. Das lässt sich nachträglich nicht mehr reparieren!', image: '' },
                    { type: 'standard', title: 'Schneiden von Audio', text: 'Markiere Huster, laute Atmer oder nervige "Ähms" in der Tonspur deines Programms (z.B. Audacity) und lösche sie einfach mit der Entf-Taste. Audio-Schnitt ist viel einfacher als Video-Schnitt!' },
                    { type: 'info', title: 'Export', text: 'Speichere fertige Podcasts immer als **.MP3** Datei ab, um enorm viel Speicherplatz zu sparen.' }
                ]},
                { title: "2. Kriterien für Qualität", intro: "Deine Hörer haben keine Bilder. Du musst sie allein mit deiner Stimme fesseln.", blocks: [
                    { type: 'info', title: 'Der richtige Raumklang', text: 'Nimm niemals in einem großen, leeren Zimmer auf (Badezimmer, Flur). Der Hall klingt unprofessionell. Ein Zimmer mit dickem Teppich, Vorhängen oder ein voller Kleiderschrank schlucken den Hall und lassen deine Stimme warm und nah klingen.' },
                    { type: 'tip', title: 'Sprechtempo und Struktur', text: 'Wenn man nervös ist, spricht man automatisch zu schnell. Zwinge dich dazu, 20% langsamer als normal zu sprechen und übertrieben deutlich zu betonen. Beginne deinen Podcast immer mit einem knackigen Intro, das dem Hörer sofort verrät, worum es in dieser Folge geht.' }
                ]}
            ],
            missions: ["Nimm auf deinem Gerät eine kurze Sprachnachricht (15 Sek.) auf: Begrüße deine unsichtbaren Zuhörer.", "Höre dir die Aufnahme mit Kopfhörern an: Gibt es viel Hall oder störende Hintergrundgeräusche?", "Mache eine neue Aufnahme und baue absichtlich eine 3-sekündige, peinliche Pause ein.", "Finde in deinem Aufnahmeprogramm die Funktion, um genau diese Pause sauber herauszuschneiden.", "Überlege dir einen richtig coolen Titel für deinen ersten eigenen Podcast."]
        },
        10: {
            sections: [
                { title: "Fremde Werke nutzen", intro: "Das Internet ist kein kostenloser Selbstbedienungsladen. Fast alles, was du dort findest, ist geschützt.", blocks: [
                    { type: 'warning', title: 'Du darfst nicht einfach klauen', text: 'Bilder, Texte, Videos und Musik aus dem Internet gehören rechtlich demjenigen, der sie erschaffen hat (dem Urheber). Wenn du einfach ein Bild aus der Google-Bildersuche kopierst und für deine öffentliche Schul-Präsentation nutzt, begehst du eine handfeste Urheberrechtsverletzung!' },
                    { type: 'info', title: 'Das Recht auf Zitate', text: 'Du darfst kurze Abschnitte aus fremden Texten nutzen, ABER du musst sie zwingend in "Anführungszeichen" setzen und direkt danach angeben, von wem der Text stammt und wo du ihn gefunden hast (Quellenangabe).' }
                ]},
                { title: "Die legale Lösung", intro: "Es gibt Millionen von Bildern, die du völlig legal und kostenlos nutzen darfst.", blocks: [
                    { type: 'success', title: 'Creative Commons (CC)', text: 'Viele Künstler stellen ihre Werke unter "Creative Commons" Lizenzen ins Netz. Das bedeutet: "Du darfst mein Bild nutzen, solange du meinen Namen nennst."', image: '' },
                    { type: 'tip', title: 'Freie Bilddatenbanken nutzen', text: 'Anstatt bei Google zu suchen, nutze Plattformen wie **Pixabay.com**, **Unsplash.com** oder **Pexels.com**. Die Fotografen dort haben ihre Bilder explizit zur freien, legalen Nutzung für alle freigegeben.' }
                ]}
            ],
            missions: ["Gehe auf die Plattform 'Pixabay.com' und suche nach einem Foto von einer großen Stadt.", "Finde heraus, was unter dem Bild bei der Lizenz steht (Meistens: Freie kommerzielle Nutzung, kein Bildnachweis nötig).", "Kopiere einen Satz aus Wikipedia in ein Textdokument und setze ihn korrekt in Anführungszeichen.", "Schreibe die genaue URL (den Link zur Webseite) als saubere Quellenangabe direkt unter dein Zitat.", "Erkläre einem Mitschüler in eigenen Worten, was das Urheberrecht eigentlich schützen soll."]
        },
        11: {
            sections: [
                { title: "Die Lüge im Netz", intro: "Jeder kann im Internet alles behaupten. Das macht es so gefährlich für die Demokratie.", blocks: [
                    { type: 'warning', title: 'Was sind Fake News?', text: 'Fake News sind absichtlich erfundene oder stark verfälschte Nachrichten. Sie sollen Leser wütend machen, Klicks generieren (um Geld mit Werbung zu verdienen) oder politische Gegner schlecht aussehen lassen.', image: '' },
                    { type: 'info', title: 'Reißerische Titel (Clickbait)', text: 'Wenn Überschriften stark emotional machen ("Du wirst nicht glauben was passiert!" oder "SKANDAL!"), nennt man das Clickbait. Sei hier extrem misstrauisch. Seriöse Nachrichten (wie die Tagesschau) nutzen keine Ausrufezeichen in Überschriften.' }
                ]},
                { title: "Wahrheit finden", intro: "Wie du Lügen in wenigen Minuten entlarven kannst.", blocks: [
                    { type: 'standard', title: 'Die 2-Quellen-Regel', text: 'Wenn du online eine wirklich krasse oder schockierende Behauptung liest, suche das Thema bei Google News. Berichten auch seriöse, große Medien darüber? Wenn nicht, ist es mit hoher Wahrscheinlichkeit Fake.' },
                    { type: 'tip', title: 'Bilder-Rückwärtssuche', text: 'Oft werden echte Bilder aus der Vergangenheit genommen und in einen falschen, neuen Zusammenhang gesetzt. Lade das Bild bei der "Google Bilderrückwärtssuche" hoch. Google zeigt dir dann, wann und wo dieses Bild zum allerersten Mal im Internet aufgetaucht ist.' }
                ]}
            ],
            missions: ["Suche eine aktuelle Schlagzeile auf einer seriösen Nachrichten-Webseite (z.B. tagesschau.de).", "Suche exakt dasselbe Thema bei Google. Berichten auch andere große Medien übereinstimmend darüber?", "Suche das Impressum auf der Homepage eurer Schule (Wer ist rechtlich verantwortlich für das, was dort steht?).", "Finde heraus, wie genau die 'Google Bilderrückwärtssuche' funktioniert.", "Diskutiert kurz: Warum erfinden Menschen eigentlich absichtlich Fake News?"]
        },
        12: {
            sections: [
                { title: "Der Preis des 'Kostenlosen'", intro: "Wenn ein digitales Produkt kostenlos ist, bist DU das Produkt.", blocks: [
                    { type: 'warning', title: 'Das unsichtbare Geschäft', text: 'Instagram, TikTok und YouTube sind nicht gratis. Sie sammeln ununterbrochen Daten darüber, wie lange du dir was ansiehst, was du likest und wer deine Freunde sind, um ein extrem wertvolles Werbe-Profil von dir zu erstellen.' },
                    { type: 'info', title: 'Tracker (Die unsichtbaren Spione)', text: 'Unsichtbare kleine Programme (Tracker und Cookies) verfolgen dich quer durch das gesamte Internet über verschiedene Webseiten hinweg. Deshalb siehst du auf Instagram plötzlich Werbung für Schuhe, die du dir gestern auf einer ganz anderen Webseite angesehen hast.' }
                ]},
                { title: "Deine Privatsphäre schützen", intro: "Du kannst nicht alles verhindern, aber du kannst es den Firmen deutlich schwerer machen.", blocks: [
                    { type: 'success', title: 'Cookie-Banner richtig nutzen', text: 'Klicke auf neuen Webseiten nicht blindlings auf "Alle akzeptieren", nur damit das nervige Fenster verschwindet. Nimm dir die 3 Sekunden Zeit, um auf "Nur essenzielle" oder "Ablehnen" zu klicken.', image: '' },
                    { type: 'tip', title: 'Profile auf Privat stellen', text: 'Stelle deine Social-Media-Accounts zwingend so ein, dass nur deine bestätigten Freunde deine Bilder und Videos sehen können. Ein öffentliches Profil ist wie ein offenes Tagebuch auf dem Marktplatz.' }
                ]}
            ],
            missions: ["Öffne eine beliebige große Nachrichten-Website und lehne im aufploppenden Cookie-Banner alles ab, was nicht zwingend nötig ist.", "Prüfe in den Einstellungen deines Smartphones, welche Apps aktuell Zugriff auf deinen Standort (GPS) haben.", "Entziehe einer App, die deinen Standort eigentlich gar nicht braucht (z.B. ein einfaches Spiel), diese Berechtigung.", "Überprüfe, ob dein primäres Instagram/TikTok-Konto auf 'Privat' oder für die ganze Welt 'Öffentlich' steht.", "Finde die Einstellung und lösche einmal komplett den Verlauf und die Cookies in deinem Webbrowser."]
        },
        22: {
            sections: [
                { title: "Die Macht des Algorithmus", intro: "Social Media Apps wollen nur eins: Deine Lebenszeit. Dafür nutzen sie psychologische Tricks.", blocks: [
                    { type: 'warning', title: 'Der Endless Scroll', text: 'Früher hatten Webseiten "Seiten", man musste umblättern. Heute gibt es in Apps kein "Ende" mehr. Wenn du nach unten wischst, lädt sofort neuer Inhalt nach. Das trickst unser Gehirn aus und wir verlieren das Zeitgefühl komplett.', image: '' },
                    { type: 'info', title: 'Analysiert in Millisekunden', text: 'Algorithmen auf TikTok oder Insta analysieren jede Millisekunde deines Verhaltens. Bleibst du bei einem Katzenvideo nur 2 Sekunden länger hängen als bei anderen, flutet dich die App danach mit Katzenvideos, um dich bloß am Screen zu halten.' }
                ]},
                { title: "Die Filterblase", intro: "Das Internet zeigt dir nicht die ganze Welt, sondern nur das, was dir gefällt.", blocks: [
                    { type: 'standard', title: 'Die Echokammer', text: 'Weil der Algorithmus dir nur Meinungen zeigt, die du ohnehin gut findest (damit du die App nicht genervt schließt), verlierst du den Blick für andere Sichtweisen. Du lebst in einer unsichtbaren "Filterblase" oder "Echokammer".' },
                    { type: 'tip', title: 'Digital Wellbeing (Gegenmaßnahmen)', text: 'Nimm die Kontrolle zurück! Nutze die "Bildschirmzeit"-Funktion deines Handys, um dir harte, unumstößliche App-Limits setzen (z.B. maximal 1 Stunde TikTok am Tag).' }
                ]}
            ],
            missions: ["Finde in den Einstellungen deines Handys die detaillierte Statistik zur 'Bildschirmzeit' (Digital Wellbeing).", "Notiere dir ehrlich, welche App du diese Woche am allerlängsten genutzt hast.", "Setze dir in den Einstellungen testweise ein App-Limit von 30 Minuten für deine absolut meistgenutzte App.", "Like heute auf Social Media absichtlich 3 Beiträge zu einem Thema, das dich eigentlich überhaupt nicht interessiert.", "Beobachte morgen: Hat sich dein Video-Feed durch diese 3 falschen Likes bereits merklich verändert?"]
        },

        // ================== KLASSE 9-10 ==================
        13: {
            sections: [
                { title: "1. Technische Bedienung", intro: "Die Kommunikation mit einer KI (wie ChatGPT) nennt man Prompting. Es ist wie Programmieren mit normaler Sprache.", blocks: [
                    { type: 'standard', title: 'Die Profi-Formel (Rolle + Aufgabe + Format)', text: 'Ein "Prompt" ist dein Befehl. Sag der KI extrem präzise, was sie tun soll. Beispiel: "Handle als Historiker (Rolle). Fasse den 2. Weltkrieg (Aufgabe) in 3 kurzen Stichpunkten zusammen (Format)."', image: '' },
                    { type: 'tip', title: 'Iteratives Arbeiten', text: 'Gib dich nie mit der ersten Antwort der KI zufrieden. Das ist erst der Rohentwurf! Gib der KI kritisches Feedback: "Das war zu kompliziert formuliert, schreibe es einfacher." oder "Kürze den zweiten Absatz." Mach sie zu deinem Assistenten.' }
                ]},
                { title: "2. Kriterien für Qualität", intro: "Künstliche Intelligenz ist mächtig, aber dumm. Sie weiß nicht, was die Wahrheit ist.", blocks: [
                    { type: 'warning', title: 'Halluzinationen (KIs lügen!)', text: 'KIs schlagen Fakten nicht nach, sie raten mathematisch das wahrscheinlichste nächste Wort. Wenn sie etwas nicht wissen, erfinden sie oft extrem überzeugend klingende Fakten ("Halluzinationen"). Überprüfe wichtige Fakten IMMER mit einer echten Suchmaschine!' },
                    { type: 'info', title: 'Der eigene Stil', text: 'KI-Texte klingen oft schrecklich langweilig, seelenlos oder benutzen immer exakt dieselben Phrasen ("Zusammenfassend lässt sich sagen..."). Ein Lehrer erkennt das sofort. Formuliere KI-Texte immer in deinen völlig eigenen Stil um.' },
                    { type: 'success', title: 'Transparenz ist Pflicht', text: 'Gib in der Schule bei Hausarbeiten oder Referaten immer mutig und offen an, wenn (und für welche Teilschritte) du eine KI zur Hilfe genutzt hast.' }
                ]}
            ],
            missions: ["Schreibe einen sehr kurzen, schlechten Prompt (z.B. 'Erkläre die Photosynthese').", "Schreibe den Prompt nun nach der Profi-Formel um: 'Handle als Bio-Lehrer. Erkläre die Photosynthese für einen 10-Jährigen in 3 sehr kurzen Sätzen'.", "Vergleiche die Ergebnisse (im Kopf oder real): Warum ist der zweite Prompt massiv besser?", "Bitte eine KI, dir ein echtes Sachbuch als Quelle für ein spezielles Fachthema zu nennen.", "Prüfe per normaler Google-Suche, ob dieses von der KI genannte Buch in der Realität wirklich existiert oder frei erfunden wurde."]
        },
        14: {
            sections: [
                { title: "1. Technische Bedienung", intro: "Die digitale Bewerbungsmappe ist dein Aushängeschild für Praktika und Jobs.", blocks: [
                    { type: 'standard', title: 'PDFs zusammenfügen (Merge)', text: 'Bei Online-Bewerbungen darfst du nicht 5 einzelne Dateien schicken. Du musst Anschreiben, Lebenslauf und alle Zeugnisse in *eine einzige* saubere PDF-Datei mergen. Nutze dafür kostenlose Tools wie PDF24 oder Adobe Acrobat Online.', image: '' },
                    { type: 'warning', title: 'Dateigröße beachten', text: 'Eine Bewerbungs-PDF sollte niemals größer als 5 MB sein. Firmen-Server blockieren riesige Dateien oft. Komprimiere große eingescannte Bilder vorher oder nutze die Funktion "PDF komprimieren".' },
                    { type: 'info', title: 'E-Mail-Etikette', text: 'Die Betreffzeile deiner E-Mail muss kurz und absolut eindeutig sein (z.B. "Bewerbung als Praktikant - Max Mustermann"). Im Textfeld schreibst du nur eine kurze, höfliche Einleitung und verweist auf die PDF-Datei im Anhang.' }
                ]},
                { title: "2. Kriterien für Qualität", intro: "Personalchefs sortieren gnadenlos aus. Der erste Eindruck entscheidet in Sekunden.", blocks: [
                    { type: 'warning', title: 'Die seriöse E-Mail-Adresse', text: 'Nutze für Bewerbungen NIEMALS E-Mail-Adressen wie `unicorn-fan2010@web.de` oder `playa99@gmx.de`. Erstelle dir eine seriöse, kostenlose Adresse nach dem klaren Muster `vorname.nachname@domain.de`.' },
                    { type: 'tip', title: 'Professionelle Netzwerke', text: 'Falls du berufliche Netzwerke (wie LinkedIn) nutzt: Ein sauberes Profil mit einem professionellen Foto wirkt bei Firmen Wunder. Urlaubs- oder Partybilder sind hier ein absolutes No-Go.' },
                    { type: 'success', title: 'Absolute Fehlerfreiheit', text: 'Lass dein Bewerbungsanschreiben IMMER von zwei anderen erwachsenen Personen auf Rechtschreibung und Grammatik gegenlesen. Ein grober Tippfehler im ersten Satz kann das sofortige Aus bedeuten.' }
                ]}
            ],
            missions: ["Erstelle testweise eine PDF-Datei aus einem völlig leeren Word-Dokument.", "Recherchiere online ein kostenloses, sicheres Tool zum 'PDF zusammenfügen' (Merge PDF).", "Formuliere einen seriösen, perfekten E-Mail-Betreff für eine fiktive Bewerbung als Praktikant im örtlichen Krankenhaus.", "Prüfe deine aktuell genutzte, private E-Mail-Adresse: Wäre sie seriös genug für eine echte Bewerbung?", "Googel dich selbst: Gibt es öffentliche Bilder oder Texte von dir, die ein zukünftiger Chef besser nicht sehen sollte?"]
        },
        15: {
            sections: [

    const App = () => {
            const [user, setUser] = useState(null);
            const [studentData, setStudentData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [authRequired, setAuthRequired] = useState(false);
            const [errorMsg, setErrorMsg] = useState("");
            const [activeStage, setActiveStage] = useState("5-6");
            
            // Zustand für das offene Modul (Modal)
            const [selectedModule, setSelectedModule] = useState(null);

            useEffect(() => {
                const bootstrap = async () => {
                    try {
                        await msalInitPromise;
                        await msalInstance.handleRedirectPromise();
                        
                        let activeAccount = msalInstance.getActiveAccount();
                        if (!activeAccount && msalInstance.getAllAccounts().length > 0) {
                            activeAccount = msalInstance.getAllAccounts()[0];
                            msalInstance.setActiveAccount(activeAccount);
                        }

                        if (activeAccount) {
                            setUser({ name: activeAccount.name, username: activeAccount.username });
                            fetchMyData(activeAccount);
                        } else {
                            setAuthRequired(true);
                            setLoading(false);
                        }
                    } catch (err) {
                        console.error(err);
                        setAuthRequired(true);
                        setLoading(false);
                    }
                };
                bootstrap();
            }, []);

            const handleLogin = () => {
                setLoading(true);
                msalInstance.loginRedirect({ scopes: ["Sites.Read.All"] });
            };

            const handleLogout = () => {
                msalInstance.logoutRedirect({ postLogoutRedirectUri: window.location.origin });
            };

            const fetchMyData = async (account) => {
                try {
                    const tokenRes = await msalInstance.acquireTokenSilent({ scopes: ["Sites.Read.All"], account });
                    const url = `https://graph.microsoft.com/v1.0/sites/${MS_CONFIG.siteId}/lists/${MS_CONFIG.listId}/items?$expand=fields&$top=999`;
                    
                    // HonorNonIndexedQueriesWarningMayFailRandomly header prevents graph API errors
                    const res = await fetch(url, { 
                        headers: { 
                            Authorization: `Bearer ${tokenRes.accessToken}`,
                            Prefer: "HonorNonIndexedQueriesWarningMayFailRandomly"
                        }
                    });
                    
                    if (!res.ok) throw new Error("Fehler beim Abrufen der SharePoint-Daten.");
                    const data = await res.json();
                    
                    const myRecord = data.value.find(item => 
                        item.fields.Title && item.fields.Title.toLowerCase() === account.username.toLowerCase()
                    );

                    if (myRecord) {
                        const f = myRecord.fields;
                        const completedArray = f.Erledigte_Module ? f.Erledigte_Module.split(',').map(m => parseInt(m.trim())).filter(n => !isNaN(n)) : [];
                        
                        let parsedDates = {};
                        if (f.Modul_Daten) {
                            try { parsedDates = JSON.parse(f.Modul_Daten); } catch(e) {}
                        }

                        setStudentData({
                            vorname: f.Vorname || "",
                            nachname: f.Nachname || "",
                            klasse: f.Klasse || "",
                            completedTasks: completedArray,
                            moduleDates: parsedDates
                        });
                    } else {
                        setErrorMsg("Deine E-Mail-Adresse wurde noch nicht in die Datenbank eingetragen. Bitte melde dich bei deiner Lehrkraft.");
                    }
                } catch (error) {
                    if (error.name === "InteractionRequiredAuthError") {
                        msalInstance.loginRedirect({ scopes: ["Sites.Read.All"] });
                    } else {
                        setErrorMsg("Fehler beim Laden deiner Daten.");
                    }
                } finally {
                    setLoading(false);
                }
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6">
                        <div className="spinner mb-6"></div>
                        <p className="text-sm font-black uppercase text-slate-400 tracking-widest text-center">Lade Profil...</p>
                    </div>
                );
            }

            if (authRequired) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6">
                        <div className="bg-white p-8 sm:p-10 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center border border-slate-100">
                            <div className="mx-auto w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mb-6 text-[#BF0D3E] shadow-sm">
                                <Icon name="graduation-cap" size={40} />
                            </div>
                            <h2 className="text-2xl sm:text-3xl font-black mb-3 uppercase tracking-tighter text-slate-800">Medienpass</h2>
                            <p className="text-slate-500 mb-8 font-medium text-sm sm:text-base leading-relaxed">Bitte melde dich mit deiner Schul-E-Mail-Adresse an, um deinen Fortschritt zu sehen.</p>
                            <button 
                                onClick={handleLogin} 
                                className="w-full text-white font-black uppercase tracking-widest px-6 py-4 rounded-2xl transition-all shadow-lg active:scale-95" 
                                style={{ backgroundColor: THOMA_RED }}>
                                Anmelden
                            </button>
                        </div>
                    </div>
                );
            }

            if (errorMsg) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6">
                        <div className="bg-white p-8 rounded-[2.5rem] shadow-xl max-w-md w-full text-center border border-red-100">
                            <div className="mx-auto w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mb-4 text-red-500">
                                <Icon name="user-x" size={32} />
                            </div>
                            <h2 className="text-xl font-black mb-2 text-slate-800">Kein Profil gefunden</h2>
                            <p className="text-slate-500 mb-6 text-sm">{errorMsg}</p>
                            <button onClick={handleLogout} className="bg-slate-100 text-slate-600 font-bold uppercase px-6 py-3 rounded-xl w-full">Abmelden</button>
                        </div>
                    </div>
                );
            }

            const totalCompleted = studentData ? studentData.completedTasks.length : 0;
            // Fortschritt dynamisch anhand aller verfügbaren Module berechnen
            const progressPercent = Math.round((totalCompleted / ALL_MODULES.length) * 100) || 0;

            return (
                <div className="min-h-screen flex flex-col bg-slate-50 font-sans pb-10 relative">
                    
                    {/* OVERLAY / MODAL: Wissensspeicher */}
                    {selectedModule && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white rounded-[3rem] w-full max-w-4xl max-h-[90vh] flex flex-col shadow-2xl overflow-hidden relative animate-in fade-in zoom-in-95 duration-200">
                                {/* Modal Header */}
                                <div className="bg-[#BF0D3E] text-white p-8 sm:p-10 flex justify-between items-center shrink-0">
                                    <div>
                                        <span className="text-red-200 text-xs font-black uppercase tracking-widest mb-2 block">
                                            {selectedModule.category === 'skills' ? 'Skills (Anwendung)' : 'Umgang (Reflexion)'} • Klasse {selectedModule.stage}
                                        </span>
                                        <h2 className="text-3xl sm:text-4xl font-black tracking-tight">{selectedModule.title}</h2>
                                    </div>
                                    <button onClick={() => setSelectedModule(null)} className="flex items-center gap-2 bg-white/20 hover:bg-white/30 text-white px-5 py-3 rounded-2xl transition-all shadow-sm active:scale-95 border border-white/30" title="Schließen">
                                        <Icon name="x" size={24} />
                                        <span className="font-bold uppercase tracking-wider text-sm hidden sm:inline">Schließen</span>
                                    </button>
                                </div>

                                {/* Modal Body (Scrollable) */}
                                <div className="p-8 sm:p-12 overflow-y-auto bg-white custom-scroll">
                                    <RenderWissensspeicher module={selectedModule} />
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Header - Mobile Optimiert */}
                    <header className="bg-[#BF0D3E] text-white pt-12 pb-6 px-6 sm:px-8 shadow-md rounded-b-[2rem] sm:rounded-b-[3rem] relative z-10">
                        <div className="max-w-5xl mx-auto flex justify-between items-start">
                            <div className="mr-4">
                                <h1 className="text-3xl sm:text-4xl font-black uppercase tracking-tighter mb-1">Hallo {studentData?.vorname}!</h1>
                                <p className="text-red-200 font-bold text-sm sm:text-base opacity-90">Klasse {studentData?.klasse} • Gymnasium Thomaeum</p>
                            </div>
                            <button onClick={handleLogout} className="flex items-center gap-2 bg-white text-[#BF0D3E] hover:bg-slate-100 px-3 py-2 sm:px-4 sm:py-2.5 rounded-xl sm:rounded-2xl transition-all shadow-lg active:scale-95 shrink-0 mt-1 sm:mt-0" title="Abmelden">
                                <Icon name="log-out" size={16} className="sm:w-[18px] sm:h-[18px]" />
                                <span className="font-black uppercase tracking-wider text-[10px] sm:text-xs">Abmelden</span>
                            </button>
                        </div>
                        
                        {/* Fortschrittsbalken */}
                        <div className="max-w-5xl mx-auto mt-8 bg-black/10 p-5 rounded-3xl backdrop-blur-sm">
                            <div className="flex justify-between items-end mb-3">
                                <span className="font-black uppercase tracking-widest text-xs sm:text-sm text-white">Dein Fortschritt</span>
                                <span className="font-black text-2xl sm:text-3xl text-white">{progressPercent}%</span>
                            </div>
                            <div className="h-4 bg-black/20 rounded-full overflow-hidden shadow-inner relative">
                                <div className="h-full bg-white rounded-full transition-all duration-1000 ease-out" style={{ width: `${progressPercent}%` }}></div>
                                {/* Trennlinien für die 3 Stufen (33% und 66%) */}
                                <div className="absolute top-0 bottom-0 left-[33.33%] w-1 bg-black/20"></div>
                                <div className="absolute top-0 bottom-0 left-[66.66%] w-1 bg-black/20"></div>
                            </div>
                            <p className="text-right mt-2 text-[10px] font-bold text-red-200 uppercase">{totalCompleted} von {ALL_MODULES.length} Modulen geschafft</p>
                        </div>
                    </header>

                    {/* Content / Module */}
                    <main className="flex-grow max-w-5xl mx-auto w-full px-4 sm:px-8 mt-[-1rem] sm:mt-[-2rem] relative z-20">
                        
                        {/* Navigation für die Jahrgangsstufen */}
                        <div className="flex gap-3 mb-2 overflow-x-auto pb-4 scrollbar-hide pt-4 sm:pt-6">
                            {["5-6", "7-8", "9-10"].map(stage => (
                                <button 
                                    key={stage} 
                                    onClick={() => setActiveStage(stage)} 
                                    className={`px-6 py-3 rounded-2xl font-black transition-all whitespace-nowrap shadow-sm ${activeStage === stage ? 'text-white shadow-md scale-105' : 'bg-white text-slate-400 border border-slate-100 hover:bg-slate-50'}`} 
                                    style={activeStage === stage ? { backgroundColor: THOMA_RED } : {}}
                                >
                                    Klasse {stage}
                                </button>
                            ))}
                        </div>

                        <div className="mb-10">
                            <h3 className="text-xl font-black text-slate-800 mb-4 flex items-center gap-2">
                                <Icon name="wrench" size={24} className="text-[#BF0D3E]" /> Skills (Anwendung)
                            </h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                {ALL_MODULES.filter(m => m.stage === activeStage && m.category === 'skills').map(modul => {
                                    const isDone = studentData?.completedTasks.includes(modul.id);
                                    const moduleData = studentData?.moduleDates[modul.id];
                                    let dateDone = "—";
                                    let teacherName = "";
                                    if (moduleData) {
                                        if (typeof moduleData === 'string') { dateDone = moduleData; }
                                        else { dateDone = moduleData.datum || "—"; teacherName = moduleData.lehrer || ""; }
                                    }

                                    return (
                                        <div 
                                            key={modul.id} 
                                            onClick={() => { if (isDone) setSelectedModule(modul); }}
                                            className={`bg-white rounded-2xl p-4 sm:p-5 border-2 transition-all flex flex-col h-full ${isDone ? 'border-green-400 shadow-green-100 shadow-lg cursor-pointer hover:-translate-y-1 hover:shadow-xl' : 'border-slate-100 shadow-sm opacity-90'}`}
                                        >
                                            <div className="flex justify-between items-start mb-4">
                                                <span className="text-[10px] font-black uppercase tracking-widest bg-slate-100 text-slate-500 px-3 py-1 rounded-lg">Klasse {modul.stage}</span>
                                                {isDone ? (
                                                    <div className="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center text-white shadow-md shrink-0 ml-2">
                                                        <Icon name="check" size={16} />
                                                    </div>
                                                ) : (
                                                    <div className="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-300 shrink-0 ml-2">
                                                        <Icon name="lock" size={14} />
                                                    </div>
                                                )}
                                            </div>
                                            
                                            <h3 className={`font-black text-base lg:text-lg tracking-tight leading-tight mb-2 flex items-start gap-2 ${isDone ? 'text-slate-800' : 'text-slate-500'}`}>
                                                <Icon name={modul.icon} size={20} className={`mt-0.5 shrink-0 ${isDone ? 'text-[#BF0D3E]' : 'text-slate-300'}`} />
                                                {modul.title}
                                            </h3>
                                            
                                            <div className="mt-auto">
                                                {isDone ? (
                                                    <div>
                                                        <div className="text-[10px] font-bold text-green-600 flex flex-col gap-0.5 mt-3 mb-4">
                                                            <span className="flex items-center gap-1">
                                                                <Icon name="calendar-check" size={12} />
                                                                Zertifiziert am {dateDone}
                                                            </span>
                                                            {teacherName && <span className="text-[9px] text-green-700 ml-4">durch {teacherName}</span>}
                                                        </div>
                                                        <div className="pt-3 border-t border-slate-100 text-center">
                                                            <span className="text-[9px] sm:text-[10px] font-black uppercase tracking-widest text-[#BF0D3E] flex items-center justify-center gap-2 group-hover:text-red-700">
                                                                <Icon name="book-open" size={14} /> Wissensspeicher
                                                            </span>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <p className="text-xs font-medium text-slate-400 mt-3">
                                                        Noch nicht freigeschaltet.
                                                    </p>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        <div className="mb-4">
                            <h3 className="text-xl font-black text-slate-800 mb-4 flex items-center gap-2">
                                <Icon name="brain" size={24} className="text-[#BF0D3E]" /> Reflexion (Umgang)
                            </h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                {ALL_MODULES.filter(m => m.stage === activeStage && m.category === 'reflexion').map(modul => {
                                    const isDone = studentData?.completedTasks.includes(modul.id);
                                    const moduleData = studentData?.moduleDates[modul.id];
                                    let dateDone = "—";
                                    let teacherName = "";
                                    if (moduleData) {
                                        if (typeof moduleData === 'string') { dateDone = moduleData; }
                                        else { dateDone = moduleData.datum || "—"; teacherName = moduleData.lehrer || ""; }
                                    }

                                    return (
                                        <div 
                                            key={modul.id} 
                                            onClick={() => { if (isDone) setSelectedModule(modul); }}
                                            className={`bg-white rounded-2xl p-4 sm:p-5 border-2 transition-all flex flex-col h-full ${isDone ? 'border-green-400 shadow-green-100 shadow-lg cursor-pointer hover:-translate-y-1 hover:shadow-xl' : 'border-slate-100 shadow-sm opacity-90'}`}
                                        >
                                            <div className="flex justify-between items-start mb-4">
                                                <span className="text-[10px] font-black uppercase tracking-widest bg-slate-100 text-slate-500 px-3 py-1 rounded-lg">Klasse {modul.stage}</span>
                                                {isDone ? (
                                                    <div className="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center text-white shadow-md shrink-0 ml-2">
                                                        <Icon name="check" size={16} />
                                                    </div>
                                                ) : (
                                                    <div className="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-300 shrink-0 ml-2">
                                                        <Icon name="lock" size={14} />
                                                    </div>
                                                )}
                                            </div>
                                            
                                            <h3 className={`font-black text-base lg:text-lg tracking-tight leading-tight mb-2 flex items-start gap-2 ${isDone ? 'text-slate-800' : 'text-slate-500'}`}>
                                                <Icon name={modul.icon} size={20} className={`mt-0.5 shrink-0 ${isDone ? 'text-[#BF0D3E]' : 'text-slate-300'}`} />
                                                {modul.title}
                                            </h3>
                                            
                                            <div className="mt-auto">
                                                {isDone ? (
                                                    <div>
                                                        <div className="text-[10px] font-bold text-green-600 flex flex-col gap-0.5 mt-3 mb-4">
                                                            <span className="flex items-center gap-1">
                                                                <Icon name="calendar-check" size={12} />
                                                                Zertifiziert am {dateDone}
                                                            </span>
                                                            {teacherName && <span className="text-[9px] text-green-700 ml-4">durch {teacherName}</span>}
                                                        </div>
                                                        <div className="pt-3 border-t border-slate-100 text-center">
                                                            <span className="text-[9px] sm:text-[10px] font-black uppercase tracking-widest text-[#BF0D3E] flex items-center justify-center gap-2 group-hover:text-red-700">
                                                                <Icon name="book-open" size={14} /> Wissensspeicher
                                                            </span>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <p className="text-xs font-medium text-slate-400 mt-3">
                                                        Noch nicht freigeschaltet.
                                                    </p>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
