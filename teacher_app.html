<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lehrer-Konsole | Gymnasium Thomaeum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="text/javascript" src="https://alcdn.msauth.net/browser/2.32.2/js/msal-browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --thomaeum-red: #BF0D3E; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-left-color: var(--thomaeum-red); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- KONFIGURATION ---
        const MS_CONFIG = {
            tenantId: "09c4bd58-1b8c-410d-930e-816015e61028",
            clientId: "7d277b19-93c1-4df7-8f1b-d38749b3d440",
            siteId: "thomaeumde.sharepoint.com,9ef17c4d-b57b-482e-9168-3cc3bc43bc3d,d600d53b-cfd0-45f7-96a5-f1ac20222f8f",
            listId: "08da02d9-5b67-4938-9d7e-9e9dee97fa2e",
            teacherGroupId: "2bbe9733-7137-4d54-a788-e988c3d56cd9" // Entra ID Gruppe für Lehrer
        };

        const msalConfig = {
            auth: {
                clientId: MS_CONFIG.clientId,
                authority: `https://login.microsoftonline.com/${MS_CONFIG.tenantId}`,
                redirectUri: window.location.origin,
                navigateToLoginRequestUrl: true
            },
            cache: { cacheLocation: "localStorage", storeAuthStateInCookie: true }
        };
        const msalInstance = new msal.PublicClientApplication(msalConfig);
        const msalInitPromise = msalInstance.initialize();

        // --- NEUE 24 MODULE FÜR DIE LEHRER-APP ---
        const ALL_MODULES = [
            { id: 1, title: "Hardware-Führerschein", stage: "5-6", category: "skills", icon: "monitor" },
            { id: 2, title: "Dateimanagement", stage: "5-6", category: "skills", icon: "folder" },
            { id: 3, title: "Umgang mit Word", stage: "5-6", category: "skills", icon: "file-text" },
            { id: 7, title: "Präsentationsprofi", stage: "5-6", category: "skills", icon: "presentation" },
            { id: 4, title: "Netiquette", stage: "5-6", category: "reflexion", icon: "message-square" },
            { id: 5, title: "Prävention", stage: "5-6", category: "reflexion", icon: "shield-alert" },
            { id: 6, title: "Suchmaschinen", stage: "5-6", category: "reflexion", icon: "search" },
            { id: 19, title: "Sichere Passwörter", stage: "5-6", category: "reflexion", icon: "key" },
            { id: 8, title: "Medienproduktion", stage: "7-8", category: "skills", icon: "video" },
            { id: 9, title: "Tabellenkalkulation", stage: "7-8", category: "skills", icon: "table" },
            { id: 20, title: "Bildbearbeitung", stage: "7-8", category: "skills", icon: "image" },
            { id: 21, title: "Audio & Podcasts", stage: "7-8", category: "skills", icon: "mic" },
            { id: 10, title: "Urheberrecht", stage: "7-8", category: "reflexion", icon: "copyright" },
            { id: 11, title: "Quellenkritik", stage: "7-8", category: "reflexion", icon: "check-circle" },
            { id: 12, title: "Datenschutz", stage: "7-8", category: "reflexion", icon: "lock" },
            { id: 22, title: "Social Media Check", stage: "7-8", category: "reflexion", icon: "smartphone" },
            { id: 13, title: "KI-Produktivität", stage: "9-10", category: "skills", icon: "cpu" },
            { id: 14, title: "Digitale Bewerbung", stage: "9-10", category: "skills", icon: "briefcase" },
            { id: 15, title: "Projektmanagement", stage: "9-10", category: "skills", icon: "kanban" },
            { id: 23, title: "Webdesign Basics", stage: "9-10", category: "skills", icon: "globe" },
            { id: 16, title: "KI-Ethik", stage: "9-10", category: "reflexion", icon: "scale" },
            { id: 17, title: "Zivilcourage", stage: "9-10", category: "reflexion", icon: "users" },
            { id: 18, title: "Digitaler Fußabdruck", stage: "9-10", category: "reflexion", icon: "footprint" },
            { id: 24, title: "Datenökonomie", stage: "9-10", category: "reflexion", icon: "database" }
        ];

        const Icon = ({ name, size = 20, className = "" }) => {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                if (window.lucide && window.lucide.icons[name]) {
                    setSvg(window.lucide.icons[name].toSvg({ width: size, height: size, class: className }));
                }
            }, [name, size, className]);
            return <span className={`inline-flex items-center justify-center ${className}`} dangerouslySetInnerHTML={{ __html: svg }} />;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [students, setStudents] = useState([]);
            const [loading, setLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState("");
            const [debugMsg, setDebugMsg] = useState("");
            const [isUpdating, setIsUpdating] = useState(false);

            // Filters
            const [searchName, setSearchName] = useState("");
            const [filterJahrgang, setFilterJahrgang] = useState("ALL");
            const [filterKlasse, setFilterKlasse] = useState("ALL");
            const [filterModul, setFilterModul] = useState("ALL");
            const [viewingStudentId, setViewingStudentId] = useState(null);

            useEffect(() => {
                const bootstrap = async () => {
                    try {
                        await msalInitPromise;
                        await msalInstance.handleRedirectPromise();
                        
                        let activeAccount = msalInstance.getActiveAccount();
                        if (!activeAccount && msalInstance.getAllAccounts().length > 0) {
                            activeAccount = msalInstance.getAllAccounts()[0];
                            msalInstance.setActiveAccount(activeAccount);
                        }

                        if (activeAccount) {
                            setUser({ name: activeAccount.name, username: activeAccount.username });
                            fetchStudents(activeAccount);
                        } else {
                            setLoading(false);
                        }
                    } catch (err) {
                        console.error(err);
                        setLoading(false);
                    }
                };
                bootstrap();
            }, []);

            const handleLogin = () => {
                setLoading(true);
                msalInstance.loginRedirect({ scopes: ["Sites.ReadWrite.All", "GroupMember.Read.All"] });
            };

            const handleLogout = () => {
                msalInstance.logoutRedirect({ postLogoutRedirectUri: window.location.origin });
            };

            const fetchStudents = async (account) => {
                try {
                    const tokenRes = await msalInstance.acquireTokenSilent({ scopes: ["Sites.ReadWrite.All", "GroupMember.Read.All"], account });
                    
                    // Türsteher: Überprüfen, ob User ein Lehrer ist (Kommentiere es aus, wenn du nur testen willst)
                    /*
                    const groupRes = await fetch('https://graph.microsoft.com/v1.0/me/memberOf', { headers: { Authorization: `Bearer ${tokenRes.accessToken}` }});
                    const groups = await groupRes.json();
                    const isTeacher = groups.value?.some(g => g.id === MS_CONFIG.teacherGroupId);
                    
                    if (!isTeacher) {
                        setErrorMsg("Zugriff verweigert. Du bist nicht als Lehrkraft autorisiert.");
                        setLoading(false);
                        return;
                    }
                    */

                    const url = `https://graph.microsoft.com/v1.0/sites/${MS_CONFIG.siteId}/lists/${MS_CONFIG.listId}/items?$expand=fields&$top=999`;
                    const res = await fetch(url, { 
                        headers: { 
                            Authorization: `Bearer ${tokenRes.accessToken}`,
                            Prefer: "HonorNonIndexedQueriesWarningMayFailRandomly"
                        }
                    });
                    
                    if (!res.ok) throw new Error("Fehler beim Abrufen der SharePoint-Daten.");
                    const data = await res.json();
                    
                    const loadedStudents = data.value.map(item => {
                        const f = item.fields;
                        const completedArray = f.Erledigte_Module ? f.Erledigte_Module.split(',').map(m => parseInt(m.trim())).filter(n => !isNaN(n)) : [];
                        let parsedDates = {};
                        if (f.Modul_Daten) {
                            try { parsedDates = JSON.parse(f.Modul_Daten); } catch(e) {}
                        }
                        return {
                            id: item.id,
                            email: f.Title || "",
                            vorname: f.Vorname || "",
                            nachname: f.Nachname || "",
                            klasse: f.Klasse || "",
                            completedTasks: completedArray,
                            moduleDates: parsedDates
                        };
                    }).filter(s => s.vorname && s.nachname);

                    setStudents(loadedStudents.sort((a,b) => a.nachname.localeCompare(b.nachname)));
                } catch (error) {
                    if (error.name === "InteractionRequiredAuthError") {
                        msalInstance.loginRedirect({ scopes: ["Sites.ReadWrite.All", "GroupMember.Read.All"] });
                    } else {
                        setErrorMsg("Fehler beim Laden der Daten.");
                    }
                } finally {
                    setLoading(false);
                }
            };

            const getTodayString = () => {
                const d = new Date();
                return `${d.getDate().toString().padStart(2, '0')}.${(d.getMonth()+1).toString().padStart(2, '0')}.${d.getFullYear()}`;
            };

            const updateStudentInSharePoint = async (studentId, newTasks, newDates) => {
                const tokenRes = await msalInstance.acquireTokenSilent({ scopes: ["Sites.ReadWrite.All"], account: msalInstance.getActiveAccount() });
                const url = `https://graph.microsoft.com/v1.0/sites/${MS_CONFIG.siteId}/lists/${MS_CONFIG.listId}/items/${studentId}/fields`;
                
                const payload = {
                    Erledigte_Module: newTasks.join(", "),
                    Modul_Daten: JSON.stringify(newDates)
                };

                await fetch(url, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${tokenRes.accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
            };

            const toggleModuleSingle = async (studentId, moduleId) => {
                if (isUpdating) return;
                setIsUpdating(true);
                setDebugMsg("");

                try {
                    const student = students.find(s => s.id === studentId);
                    const isDone = student.completedTasks.includes(moduleId);
                    
                    let newTasks, newDates;
                    if (isDone) {
                        newTasks = student.completedTasks.filter(id => id !== moduleId);
                        newDates = { ...student.moduleDates };
                        delete newDates[moduleId];
                    } else {
                        newTasks = [...student.completedTasks, moduleId];
                        newDates = { ...student.moduleDates, [moduleId]: { datum: getTodayString(), lehrer: user.name } };
                    }

                    await updateStudentInSharePoint(studentId, newTasks, newDates);
                    
                    setStudents(students.map(s => s.id === studentId ? { ...s, completedTasks: newTasks, moduleDates: newDates } : s));
                    setDebugMsg(`Erfolgreich aktualisiert.`);
                } catch (err) {
                    setDebugMsg("Fehler beim Speichern!");
                    console.error(err);
                } finally {
                    setIsUpdating(false);
                    setTimeout(() => setDebugMsg(""), 3000);
                }
            };

            const bulkToggle = async (action) => {
                if (isUpdating || filterModul === "ALL" || filteredStudents.length === 0) return;
                setIsUpdating(true);
                setDebugMsg("Starte Massen-Update...");

                const mId = parseInt(filterModul);
                let successCount = 0;

                for (const student of filteredStudents) {
                    const isDone = student.completedTasks.includes(mId);
                    if ((action === 'grant' && !isDone) || (action === 'revoke' && isDone)) {
                        let newTasks, newDates;
                        if (action === 'grant') {
                            newTasks = [...student.completedTasks, mId];
                            newDates = { ...student.moduleDates, [mId]: { datum: getTodayString(), lehrer: user.name } };
                        } else {
                            newTasks = student.completedTasks.filter(id => id !== mId);
                            newDates = { ...student.moduleDates };
                            delete newDates[mId];
                        }
                        
                        try {
                            await updateStudentInSharePoint(student.id, newTasks, newDates);
                            setStudents(prev => prev.map(s => s.id === student.id ? { ...s, completedTasks: newTasks, moduleDates: newDates } : s));
                            successCount++;
                        } catch(e) {
                            console.error(`Fehler bei Schüler ${student.nachname}`);
                        }
                    }
                }

                setIsUpdating(false);
                setDebugMsg(`${successCount} Schüler aktualisiert.`);
                setTimeout(() => setDebugMsg(""), 3000);
            };

            // Filter Logic
            const uniqueKlassen = useMemo(() => [...new Set(students.map(s => s.klasse))].filter(k => k).sort(), [students]);
            const uniqueJahrgaenge = useMemo(() => {
                const jgs = new Set();
                uniqueKlassen.forEach(k => {
                    const match = k.match(/^(\d+)/);
                    if (match) jgs.add(match[1]);
                });
                return [...jgs].sort((a,b) => parseInt(a) - parseInt(b));
            }, [uniqueKlassen]);

            let filteredStudents = students;
            if (searchName) {
                const sLower = searchName.toLowerCase();
                filteredStudents = filteredStudents.filter(s => s.vorname.toLowerCase().includes(sLower) || s.nachname.toLowerCase().includes(sLower));
            }
            if (filterJahrgang !== "ALL") {
                filteredStudents = filteredStudents.filter(s => s.klasse.startsWith(filterJahrgang));
            }
            if (filterKlasse !== "ALL") {
                filteredStudents = filteredStudents.filter(s => s.klasse === filterKlasse);
            }

            const hasActiveFilters = searchName || filterJahrgang !== "ALL" || filterKlasse !== "ALL" || filterModul !== "ALL";
            const currentViewingStudent = students.find(s => s.id === viewingStudentId);

            if (loading) {
                return <div className="min-h-screen flex items-center justify-center"><div className="spinner"></div></div>;
            }

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50 p-4">
                        <div className="bg-white max-w-md w-full rounded-[2.5rem] shadow-2xl p-10 text-center border border-slate-100">
                            <div className="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6 text-[#BF0D3E]">
                                <Icon name="graduation-cap" size={40} />
                            </div>
                            <h1 className="text-3xl font-black text-slate-800 mb-2">Lehrer-Konsole</h1>
                            <p className="text-slate-500 mb-8 font-medium">Gymnasium Thomaeum</p>
                            {errorMsg && <p className="text-red-600 text-sm mb-6 bg-red-50 p-3 rounded-xl">{errorMsg}</p>}
                            <button onClick={handleLogin} className="w-full bg-[#BF0D3E] hover:bg-red-800 text-white font-bold py-4 rounded-2xl transition-all shadow-lg">
                                Mit Microsoft verbinden
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 font-sans flex flex-col">
                    
                    {/* STUDENT PROFIL MODAL */}
                    {currentViewingStudent && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in fade-in duration-200">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-4xl max-h-[90vh] flex flex-col shadow-2xl overflow-hidden">
                                <div className="bg-slate-800 text-white p-6 flex justify-between items-center shrink-0">
                                    <div>
                                        <p className="text-slate-300 text-xs font-black uppercase tracking-widest mb-1">Schülerprofil</p>
                                        <h2 className="text-2xl font-black">{currentViewingStudent.nachname}, {currentViewingStudent.vorname}</h2>
                                    </div>
                                    <button onClick={() => setViewingStudentId(null)} className="bg-white/20 p-2 rounded-full hover:bg-white/30 transition-colors">
                                        <Icon name="x" size={24} />
                                    </button>
                                </div>
                                <div className="p-6 overflow-y-auto">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                        {ALL_MODULES.map(modul => {
                                            const isDone = currentViewingStudent.completedTasks.includes(modul.id);
                                            return (
                                                <button 
                                                    key={modul.id}
                                                    disabled={isUpdating}
                                                    onClick={() => toggleModuleSingle(currentViewingStudent.id, modul.id)}
                                                    className={`p-4 rounded-2xl border-2 text-left transition-all flex flex-col h-full ${isDone ? 'bg-green-50 border-green-500 shadow-sm' : 'bg-white border-slate-100 hover:border-slate-300'}`}
                                                >
                                                    <div className="flex justify-between items-start mb-2 w-full">
                                                        <Icon name={modul.icon} size={24} className={isDone ? 'text-green-600' : 'text-slate-400'} />
                                                        {isDone ? <Icon name="check-circle-2" size={20} className="text-green-500" /> : <Icon name="circle" size={20} className="text-slate-200" />}
                                                    </div>
                                                    <div className="text-[10px] font-bold text-slate-400 uppercase mt-auto pt-2">{modul.stage}</div>
                                                    <div className={`font-bold text-sm leading-tight mt-1 ${isDone ? 'text-green-900' : 'text-slate-700'}`}>{modul.title}</div>
                                                </button>
                                            )
                                        })}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* HEADER */}
                    <header className="bg-[#BF0D3E] text-white pt-10 pb-16 px-6 sm:px-8 shadow-md rounded-b-[2rem] sm:rounded-b-[3rem] relative z-10">
                        <div className="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6">
                            <div className="flex items-center gap-4">
                                <div className="p-3 bg-white/20 rounded-2xl backdrop-blur-sm">
                                    <Icon name="graduation-cap" size={32} />
                                </div>
                                <div>
                                    <h1 className="text-2xl sm:text-4xl font-black uppercase tracking-tighter mb-1">Lehrer-Konsole</h1>
                                    <p className="text-red-200 font-bold text-sm">Gymnasium Thomaeum</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-right hidden sm:block">
                                    <p className="text-[10px] font-black text-green-300 uppercase tracking-widest mb-0.5 flex items-center justify-end gap-1"><Icon name="shield-check" size={12}/> Verbunden</p>
                                    <p className="text-sm font-bold">{user.name}</p>
                                </div>
                                <button onClick={handleLogout} className="bg-white/20 hover:bg-white/30 text-white px-4 py-2.5 rounded-xl font-bold uppercase text-xs tracking-wider transition-all flex items-center gap-2">
                                    <Icon name="log-out" size={16} /> Abmelden
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* SCHWEBENDE FILTER-KARTE */}
                    <div className="max-w-7xl mx-auto w-full px-4 sm:px-8 -mt-8 relative z-30 mb-8">
                        <div className="bg-white shadow-xl rounded-[2rem] p-5 sm:p-6 border border-slate-100 flex flex-col gap-4">
                            <div className="flex flex-wrap gap-4 items-center">
                                <div className="relative flex-grow min-w-[200px]">
                                    <Icon name="search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                    <input type="text" placeholder="Nachname / Vorname suchen..." className="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold outline-none focus:ring-2 focus:ring-[#BF0D3E] transition-all" value={searchName} onChange={e => setSearchName(e.target.value)} />
                                </div>
                                
                                <select className="bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-[#BF0D3E] cursor-pointer transition-all" value={filterJahrgang} onChange={e => {setFilterJahrgang(e.target.value); setFilterKlasse("ALL");}}>
                                    <option value="ALL">Alle Jahrgänge</option>
                                    {uniqueJahrgaenge.map(j => <option key={j} value={j}>Jahrgang {j}</option>)}
                                </select>

                                <select className="bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-[#BF0D3E] cursor-pointer transition-all" value={filterKlasse} onChange={e => setFilterKlasse(e.target.value)}>
                                    <option value="ALL">Alle Klassen</option>
                                    {uniqueKlassen.filter(k => filterJahrgang === "ALL" || k.startsWith(filterJahrgang)).map(k => <option key={k} value={k}>Klasse {k}</option>)}
                                </select>

                                <select className="bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-[#BF0D3E] cursor-pointer transition-all" value={filterModul} onChange={e => setFilterModul(e.target.value)}>
                                    <option value="ALL">Modul auswählen...</option>
                                    {ALL_MODULES.map(m => <option key={m.id} value={m.id}>Modul {m.id}: {m.title} ({m.stage})</option>)}
                                </select>
                            </div>
                            
                            {filterModul !== "ALL" && hasActiveFilters && (
                                <div className="mt-2 p-5 bg-blue-50 rounded-2xl flex flex-wrap items-center justify-between gap-4 border border-blue-100">
                                    <div>
                                        <h3 className="text-sm font-black text-blue-900 uppercase tracking-tight flex items-center gap-2"><Icon name="users" size={16}/> Massen-Bearbeitung (Modul {filterModul})</h3>
                                        <p className="text-xs font-medium text-blue-700 mt-1">Wendet die Aktion auf alle {filteredStudents.length} angezeigten Schüler an.</p>
                                    </div>
                                    <div className="flex gap-2 w-full sm:w-auto">
                                        <button disabled={isUpdating} onClick={() => bulkToggle('revoke')} className="flex-1 sm:flex-none bg-white text-slate-700 hover:bg-slate-100 border border-slate-200 px-5 py-3 rounded-xl text-xs font-black uppercase tracking-widest transition-all">Alle zurücksetzen</button>
                                        <button disabled={isUpdating} onClick={() => bulkToggle('grant')} className="flex-1 sm:flex-none bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl text-xs font-black uppercase tracking-widest transition-all shadow-md active:scale-95">Alle freischalten</button>
                                    </div>
                                </div>
                            )}
                            {debugMsg && <p className="text-center text-xs font-bold text-green-600 mt-1">{debugMsg}</p>}
                        </div>
                    </div>

                    {/* HAUPTBEREICH: TABELLE */}
                    <main className="max-w-7xl mx-auto w-full px-4 sm:px-8 flex-grow pb-12">
                        {!hasActiveFilters ? (
                            <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 p-12 text-center flex flex-col items-center justify-center min-h-[400px]">
                                <div className="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 mb-6">
                                    <Icon name="filter" size={48} />
                                </div>
                                <h2 className="text-3xl font-black text-slate-800 mb-3 tracking-tighter">Bereit für die Eingabe</h2>
                                <p className="text-slate-500 max-w-md font-medium text-lg leading-relaxed">Nutze die Filter oben (z.B. nach Klasse oder Modul), um eine Auswahl anzuzeigen.</p>
                            </div>
                        ) : (
                            <div className="bg-white rounded-[2.5rem] shadow-lg border border-slate-100 overflow-hidden">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse min-w-[600px]">
                                        <thead>
                                            <tr className="bg-slate-50/80 text-slate-400 text-xs uppercase tracking-widest font-black border-b border-slate-100">
                                                <th className="p-5 pl-8">Nachname</th>
                                                <th className="p-5">Vorname</th>
                                                <th className="p-5">Klasse</th>
                                                <th className="p-5 text-center">
                                                    {filterModul === "ALL" ? "Gesamtfortschritt" : `Status: Modul ${filterModul}`}
                                                </th>
                                                <th className="p-5 text-center w-32">Ansicht</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {filteredStudents.length === 0 ? (
                                                <tr><td colSpan="5" className="p-12 text-center text-slate-400 font-bold text-lg">Keine Schüler gefunden.</td></tr>
                                            ) : filteredStudents.map(student => {
                                                const totalProgress = Math.round((student.completedTasks.length / ALL_MODULES.length) * 100);
                                                const isModulDone = filterModul !== "ALL" && student.completedTasks.includes(parseInt(filterModul));

                                                return (
                                                    <tr key={student.id} className="border-b border-slate-50 last:border-0 hover:bg-slate-50/50 transition-colors">
                                                        <td className="p-5 pl-8 font-black text-slate-800 text-lg">{student.nachname || "-"}</td>
                                                        <td className="p-5 font-semibold text-slate-600">{student.vorname || "-"}</td>
                                                        <td className="p-5">
                                                            <span className="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-xl text-xs font-black uppercase tracking-widest">{student.klasse}</span>
                                                        </td>
                                                        <td className="p-5 text-center">
                                                            {filterModul === "ALL" ? (
                                                                <div className="flex items-center justify-center gap-3">
                                                                    <div className="w-32 h-3 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                                                                        <div className="h-full bg-green-500 rounded-full" style={{ width: `${totalProgress}%` }}></div>
                                                                    </div>
                                                                    <span className="text-xs font-black text-slate-500 w-8">{totalProgress}%</span>
                                                                </div>
                                                            ) : (
                                                                <button 
                                                                    disabled={isUpdating}
                                                                    onClick={() => toggleModuleSingle(student.id, parseInt(filterModul))}
                                                                    className={`w-10 h-10 rounded-xl flex items-center justify-center mx-auto transition-all transform hover:scale-110 active:scale-95 ${isModulDone ? 'bg-green-500 text-white shadow-lg shadow-green-200' : 'bg-slate-100 text-slate-300 hover:bg-green-500 hover:text-white'}`}
                                                                >
                                                                    <Icon name={isModulDone ? "check" : "circle"} size={20} />
                                                                </button>
                                                            )}
                                                        </td>
                                                        <td className="p-5 text-center">
                                                            <button 
                                                                onClick={() => setViewingStudentId(student.id)}
                                                                className="flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl bg-slate-800 text-white hover:bg-[#BF0D3E] text-[10px] font-black uppercase tracking-widest transition-all mx-auto shadow-md"
                                                            >
                                                                <Icon name="user" size={14} /> Profil
                                                            </button>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
